<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Portfolio</title>
    
    <!-- Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.4);
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent-color: #007AFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background-color: #f5f5f7;
            /* Wallpaper style ala MacOS */
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,91%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,91%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(213,47%,91%,1) 0, transparent 50%);
            background-size: cover;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-weight: 600;
            font-size: 3rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1d1d1f 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            border: 1px solid var(--border-glass);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.85);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Badge Styling */
        .badge.popular { background: rgba(0, 122, 255, 0.1); color: #007AFF; }
        .badge.new { background: rgba(46, 204, 113, 0.1); color: #28a745; }
        .badge.best-seller { background: rgba(0, 122, 255, 0.1); color: #007AFF; }
        .badge.heritage { background: rgba(0, 0, 0, 0.05); color: #1d1d1f; }
        .badge.modern-choice { background: rgba(46, 204, 113, 0.1); color: #28a745; }
        .badge.jawa { background: rgba(220, 53, 69, 0.1); color: #DC3545; }
        .badge.elegance { background: rgba(0, 122, 255, 0.1); color: #007AFF; }
        .badge.premium { background: rgba(0, 122, 255, 0.1); color: #007AFF; }
        .badge.fresh { background: rgba(46, 204, 113, 0.1); color: #28a745; }
        .badge.best-choose { background: rgba(0, 122, 255, 0.1); color: #007AFF; }
        .badge.classic { background: rgba(127, 140, 141, 0.1); color: #869094; }

        .thumbnail-container {
            border-radius: 12px;
            overflow: hidden;
            margin-top: -20px;
            padding-bottom: 15px;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.5s ease;
        }

        .card:hover .thumbnail {
            transform: scale(1.03);
        }

        .title {
            font-size: 1.4rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-glass);
            padding-top: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .price {
            font-weight: 500;
            color: var(--text-primary);
        }

        #status-message {
            text-align: center;
            padding: 20px;
            font-size: 1rem;
            color: var(--text-secondary);
            display: none; /* Default hidden */
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Koleksi Portfolio</h1>
            <p class="subtitle">Desain eksklusif untuk momen spesial Anda</p>
        </header>

        <!-- Pesan Error/Loading (Default Hidden) -->
        <div id="status-message"></div>

        <!-- Grid Container -->
        <div id="portfolio-grid" class="grid">
            <!-- Item akan digenerate oleh Javascript disini -->
        </div>
    </div>

    <script>
        // ⚠️ PENTING: Gunakan file data.js di folder yang SAMA
        const DATA_FILE = 'data.js'; 

        document.addEventListener('DOMContentLoaded', () => {
            // Fungsi untuk mengecek koneksi dan memuat data
            fetch(DATA_FILE)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json(); // Parse JSON langsung
                })
                .then(data => {
                    // Validasi data bukan null dan adalah array
                    if (!Array.isArray(data)) {
                        showStatus("Format data tidak valid. Pastikan data.js berisi Array [ {...}, {...} ].");
                        return;
                    }
                    
                    // Render Grid dengan data yang didapat
                    renderGallery(data);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    
                    let errorMessage = "Gagal memuat katalog.";
                    if (error.message.includes("data.js")) {
                        errorMessage = "File 'data.js' tidak ditemukan atau belum diupload.<br><br>" +
                                       "Pastikan Anda sudah menyimpan file sebagai <b>data.js</b> dan sudah meng-UPLOAD ke GitHub Pages.";
                    } else if (error.message.includes("Unexpected token")) {
                         errorMessage = "Format JSON salah. Pastikan isi data.js adalah [ {...}, {...} ] tanpa kata 'const'.";
                    }

                    showStatus(errorMessage);
                });

            function renderGallery(data) {
                const grid = document.getElementById('portfolio-grid');
                const statusDiv = document.getElementById('status-message');
                
                // Reset Error Message jika berhasil load data baru
                if(statusDiv) statusDiv.style.display = 'none';

                // Hapus semua kartu lama
                grid.innerHTML = '';

                // 1. Sortir berdasarkan ID (angka) agar rapi
                const sortedData = data.sort((a, b) => {
                    const numA = parseInt(a.id.replace(/\D/g, ''));
                    const numB = parseInt(b.id.replace(/\D/g, ''));
                    
                    // Jika parsing gagal (misal format ID beda), return 0
                    if (isNaN(numA)) return 1;
                    if (isNaN(numB)) return -1;
                    
                    return numA - numB;
                });

                // Filter duplikat berdasarkan ID dan Thumbnail
                const uniqueData = Array.from(
                    new Map(sortedData.map(item => [`${item.id}-${item.thumbnail}`, item])).values()
                );

                // Tampilkan jumlah data yang berhasil dimuat (Hanya untuk Debugging)
                console.log(`Total items dimuat dari GitHub Pages: ${uniqueData.length}`);

                // Render setiap item
                uniqueData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Tentukan badge class yang sesuai dengan nama badge di JSON
                    let badgeClass = '';
                    if (item.badge) {
                        badgeClass = `badge ${normalizeBadgeClass(item.badge)}`;
                    }

                    card.innerHTML = `
                        <span class="${badgeClass}">${item.badge || ''}</span>
                        <div class="thumbnail-container">
                            <img src="${item.thumbnail}" alt="${item.title}" class="thumbnail" onerror="this.src='https://placehold.co/600x400/f5f5f7/808080?text=No+Image'">
                        </div>
                        <h2 class="title">${item.title}</h2>
                        <p class="description">${item.description}</p>
                        <div class="card-footer">
                            <span>ID: ${item.id}</span>
                            <span class="price">${item.price}</span>
                        </div>
                    `;

                    // Jika folder berisi URL valid, klik akan membuka link
                    if(item.folder && item.folder.startsWith('http')) {
                        card.addEventListener('click', () => {
                            window.location.href = item.folder;
                        });
                    }

                    grid.appendChild(card);
                });
            }

            function normalizeBadgeClass(badge) {
                const badgeLower = badge.toLowerCase();
                
                if (badge.includes('Popular') || badge === '') return 'popular';
                if (badge.includes('New')) return 'new';
                if (badge.includes('Best Seller') || badge.includes('Best Choose')) return 'best-seller';
                if (badge.includes('Heritage')) return 'heritage';
                if (badge.includes('Modern Choice')) return 'modern-choice';
                if (badge.includes('Jawa')) return 'jawa';
                if (badge.includes('Elegance')) return 'elegance';
                if (badge.includes('Premium')) return 'premium';
                if (badge.includes('Fresh')) return 'fresh';
                if (badge.includes('Classic')) return 'classic';
                
                // Fallback untuk badge lain yang tidak terdaftar
                return `badge ${badgeLower.split(' ').join('-')}`;
            }

            function showStatus(msg) {
                const statusDiv = document.getElementById('status-message');
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = `<p style="color:#333; font-weight:bold;">${msg}</p>`;
            }
        });
    </script>
</body>
</html>
