<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-glass: rgba(255,255,255,0.7);
    --text-primary:#1d1d1f;
    --text-secondary:#6e6e73;
    --wa-green:#25D366;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#f5f5f7;
}

/* HEADER */
.header-bar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:20px;
}

.logo{
    width:40px;
    height:40px;
    object-fit:contain;
}

.header-title{
    font-size:1.5rem;
    font-weight:600;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:10px 20px 40px;
}

.subtitle{
    text-align:center;
    color:var(--text-secondary);
    margin-bottom:30px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

/* CARD */
.card{
    background:var(--bg-glass);
    backdrop-filter:blur(20px);
    border-radius:16px;
    padding:20px;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMAGE */
.thumbnail{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    border-radius:10px;
}

/* TEXT */
.title{font-weight:600;}
.description{
    font-size:0.9rem;
    color:var(--text-secondary);
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-between;
    font-size:0.9rem;
}

/* BADGE */
.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:0.7rem;
}

.popular{background:#e7f1ff;color:#007aff;}
.new{background:#e6f7ec;color:#28a745;}
.best-seller{background:#e7f1ff;color:#007aff;}
.premium{background:#e7f1ff;color:#007aff;}
.jawa{background:#ffeaea;color:#dc3545;}
.classic{background:#f1f1f1;color:#666;}

/* BOOKING BUTTON */
.booking-btn{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:var(--wa-green);
    color:white;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
}

.booking-btn:hover{
    opacity:0.9;
}

#status{
    text-align:center;
    margin-top:20px;
    display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header-bar">
    <img src="logo.png" class="logo">
    <div class="header-title">Katalog Undangan Digital</div>
</div>

<div class="container">
<p class="subtitle">Pilih desain terbaik untuk momen spesial Anda</p>

<div id="status"></div>
<div id="grid" class="grid"></div>
</div>

<script>
const DATA_FILE = "data.json";

/* GANTI NOMOR WA DISINI */
const WHATSAPP_NUMBER = "6281234567890";

fetch(DATA_FILE)
.then(res => {
    if(!res.ok) throw new Error("Gagal load data");
    return res.json();
})
.then(data => render(data))
.catch(err => {
    console.error(err);
    showStatus("Gagal load data. Pastikan data.json ada.");
});

function render(data){
    const grid = document.getElementById("grid");

    data.sort((a,b)=>{
        const na=parseInt(a.id.replace(/\D/g,''));
        const nb=parseInt(b.id.replace(/\D/g,''));
        return na-nb;
    });

    data.forEach(item=>{
        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <span class="badge ${badgeClass(item.badge)}">${item.badge||""}</span>
            <img class="thumbnail" src="${item.thumbnail}" onerror="this.src='https://placehold.co/600x400'">
            <div class="title">${item.title}</div>
            <div class="description">${item.description}</div>
            <div class="footer">
                <span>${item.id}</span>
                <span>${item.price}</span>
            </div>
            <button class="booking-btn">Booking Now</button>
        `;

        /* klik card = buka preview */
        div.querySelector(".thumbnail").onclick = () => {
            window.location.href = item.folder;
        };

        /* tombol booking WA */
        div.querySelector(".booking-btn").onclick = (e) => {
            e.stopPropagation();

            const text = encodeURIComponent(
                `Halo, saya tertarik dengan:\n\n${item.title} (${item.id})\nHarga: ${item.price}`
            );

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`, "_blank");
        };

        grid.appendChild(div);
    });
}

function badgeClass(b){
    if(!b) return "popular";
    b=b.toLowerCase();

    if(b.includes("new")) return "new";
    if(b.includes("best")) return "best-seller";
    if(b.includes("premium")) return "premium";
    if(b.includes("jawa")) return "jawa";
    if(b.includes("classic")) return "classic";

    return "popular";
}

function showStatus(msg){
    const el=document.getElementById("status");
    el.style.display="block";
    el.innerHTML=msg;
}
</script>

</body>
</html>
