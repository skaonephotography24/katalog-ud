<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Undangan Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --glass-bg: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.3);
    --text-primary:#1d1d1f;
    --text-secondary:#6e6e73;
    --wa-green:#25D366;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    color:var(--text-primary);

    /* BACKGROUND ala macOS */
    background:
        radial-gradient(at 0% 0%, #e7ecff 0%, transparent 50%),
        radial-gradient(at 100% 0%, #ffe7f0 0%, transparent 50%),
        radial-gradient(at 50% 100%, #e7fff4 0%, transparent 50%),
        #f5f5f7;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:20px 30px;

    backdrop-filter: blur(20px);
    background: var(--glass-bg);
    border-bottom:1px solid var(--glass-border);
}

.logo{
    width:42px;
    height:42px;
}

.title{
    font-size:1.6rem;
    font-weight:600;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
}

.subtitle{
    text-align:center;
    color:var(--text-secondary);
    margin-bottom:35px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:28px;
}

/* CARD GLASS */
.card{
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border:1px solid var(--glass-border);
    border-radius:18px;
    padding:18px;

    transition:0.3s;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.card:hover{
    transform: translateY(-6px);
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* IMAGE */
.thumbnail{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    border-radius:12px;
}

/* BADGE */
.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:0.7rem;
    font-weight:500;
}

.popular{background:#e7f1ff;color:#007aff;}
.new{background:#e6f7ec;color:#28a745;}
.best-seller{background:#e7f1ff;color:#007aff;}
.premium{background:#e7f1ff;color:#007aff;}
.jawa{background:#ffeaea;color:#dc3545;}
.classic{background:#f1f1f1;color:#666;}

/* TEXT */
.card-title{
    font-weight:600;
    font-size:1.05rem;
}

.description{
    font-size:0.9rem;
    color:var(--text-secondary);
    line-height:1.4;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-between;
    font-size:0.85rem;
}

/* BUTTON WA */
.booking-btn{
    margin-top:8px;
    padding:11px;
    border:none;
    border-radius:12px;

    background:var(--wa-green);
    color:white;
    font-weight:500;
    letter-spacing:0.2px;

    cursor:pointer;
    transition:all 0.2s ease;
}

.booking-btn:hover{
    transform:scale(1.02);
    box-shadow:0 6px 18px rgba(37,211,102,0.35);
}

/* STATUS */
#status{
    text-align:center;
    margin-top:20px;
    display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo">
    <div class="title">Katalog Undangan Digital</div>
</div>

<div class="container">
<p class="subtitle">Desain eksklusif dengan tampilan modern & elegan</p>

<div id="status"></div>
<div id="grid" class="grid"></div>
</div>

<script>
const DATA_FILE = "data.json";
const WHATSAPP_NUMBER = "6285712130175";

/* LOAD DATA */
fetch(DATA_FILE)
.then(res=>{
    if(!res.ok) throw new Error();
    return res.json();
})
.then(data=>render(data))
.catch(()=>showStatus("Gagal memuat data"));

function render(data){
    const grid=document.getElementById("grid");

    data.sort((a,b)=>{
        const na=parseInt(a.id.replace(/\D/g,''));
        const nb=parseInt(b.id.replace(/\D/g,''));
        return na-nb;
    });

    data.forEach(item=>{
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <span class="badge ${badgeClass(item.badge)}">${item.badge||""}</span>
            <img class="thumbnail" src="${item.thumbnail}">
            <div class="card-title">${item.title}</div>
            <div class="description">${item.description}</div>
            <div class="footer">
                <span>${item.id}</span>
                <span>${item.price}</span>
            </div>
            <button class="booking-btn">Booking Now</button>
        `;

        /* klik gambar = preview */
        card.querySelector(".thumbnail").onclick=()=>{
            window.location.href=item.folder;
        };

        /* booking WA */
        card.querySelector(".booking-btn").onclick=(e)=>{
            e.stopPropagation();

            const text=encodeURIComponent(
                `Halo, saya ingin booking:\n\n${item.title}\nID: ${item.id}\nHarga: ${item.price}`
            );

            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${text}`,"_blank");
        };

        grid.appendChild(card);
    });
}

function badgeClass(b){
    if(!b) return "popular";
    b=b.toLowerCase();

    if(b.includes("new")) return "new";
    if(b.includes("best")) return "best-seller";
    if(b.includes("premium")) return "premium";
    if(b.includes("jawa")) return "jawa";
    if(b.includes("classic")) return "classic";

    return "popular";
}

function showStatus(msg){
    const el=document.getElementById("status");
    el.style.display="block";
    el.innerText=msg;
}
</script>

</body>
</html>
