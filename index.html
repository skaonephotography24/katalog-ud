<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-glass: rgba(255,255,255,0.7);
    --border-glass: rgba(255,255,255,0.4);
    --text-primary:#1d1d1f;
    --text-secondary:#6e6e73;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#f5f5f7;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

header{text-align:center;margin-bottom:50px;}
h1{font-size:2.8rem;font-weight:600;}
.subtitle{color:#6e6e73;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:var(--bg-glass);
    backdrop-filter:blur(20px);
    border-radius:16px;
    padding:20px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.thumbnail{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    border-radius:10px;
}

.title{font-weight:600;margin-top:10px;}
.description{
    font-size:0.9rem;
    color:var(--text-secondary);
}

.footer{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-size:0.9rem;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:0.7rem;
    margin-bottom:8px;
}

.popular{background:#e7f1ff;color:#007aff;}
.new{background:#e6f7ec;color:#28a745;}
.best-seller{background:#e7f1ff;color:#007aff;}
.premium{background:#e7f1ff;color:#007aff;}
.jawa{background:#ffeaea;color:#dc3545;}
.classic{background:#f1f1f1;color:#666;}

#status{
    text-align:center;
    margin-top:20px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
<header>
<h1>Koleksi Portfolio</h1>
<p class="subtitle">Desain eksklusif untuk momen spesial</p>
</header>

<div id="status"></div>
<div id="grid" class="grid"></div>
</div>

<script>
const DATA_FILE = "data.json";

fetch(DATA_FILE)
.then(res => {
    if(!res.ok) throw new Error("Gagal load data");
    return res.json();
})
.then(data => render(data))
.catch(err => {
    console.error(err);
    showStatus("Gagal load data. Pastikan data.json ada.");
});

function render(data){
    const grid = document.getElementById("grid");

    data.sort((a,b)=>{
        const na=parseInt(a.id.replace(/\D/g,''));
        const nb=parseInt(b.id.replace(/\D/g,''));
        return na-nb;
    });

    data.forEach(item=>{
        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <span class="badge ${badgeClass(item.badge)}">${item.badge||""}</span>
            <img class="thumbnail" src="${item.thumbnail}" onerror="this.src='https://placehold.co/600x400'">
            <div class="title">${item.title}</div>
            <div class="description">${item.description}</div>
            <div class="footer">
                <span>${item.id}</span>
                <span>${item.price}</span>
            </div>
        `;

        if(item.folder){
            div.onclick=()=>window.location.href=item.folder;
        }

        grid.appendChild(div);
    });
}

function badgeClass(b){
    if(!b) return "popular";
    b=b.toLowerCase();

    if(b.includes("new")) return "new";
    if(b.includes("best")) return "best-seller";
    if(b.includes("premium")) return "premium";
    if(b.includes("jawa")) return "jawa";
    if(b.includes("classic")) return "classic";

    return "popular";
}

function showStatus(msg){
    const el=document.getElementById("status");
    el.style.display="block";
    el.innerHTML=msg;
}
</script>

</body>
</html>
